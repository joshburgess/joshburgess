<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet">
  <style>
    .bg { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 1; }
    .name { font: 700 28px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #0969da; }
    .desc { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #59636e; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #161b22; stroke: #30363d; }
      .name { fill: #4493f8; }
      .desc { fill: #9198a1; }
    }
  </style>
  <rect class="bg" x="2" y="2" width="996" height="86" rx="10"/>
  <text class="name" x="500" y="37" text-anchor="middle">elm-client-gen</text>
  <text class="desc" x="500" y="65" text-anchor="middle">generates Elm types, decoders, encoders, and HTTP clients from Rust types and Axum handlers</text>
</svg>
