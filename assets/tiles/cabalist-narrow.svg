<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 168" preserveAspectRatio="xMidYMid meet">
  <style>
    .bg { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 1; }
    .name { font: 700 48px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #0969da; }
    .desc { font: 32px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #59636e; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #161b22; stroke: #30363d; }
      .name { fill: #4493f8; }
      .desc { fill: #9198a1; }
    }
  </style>
  <rect class="bg" x="2" y="2" width="996" height="164"/>
  <text class="name" x="500" y="54" text-anchor="middle">cabalist</text>
  <text class="desc" x="500" y="108" text-anchor="middle">opinionated toolkit for managing Haskell .cabal files,</text>
  <text class="desc" x="500" y="146" text-anchor="middle">with a TUI, scriptable CLI, and LSP server</text>
</svg>
